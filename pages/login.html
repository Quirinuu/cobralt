<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Área administrativa CoBraLT">
  <meta name="theme-color" content="#013684">
  <title>Admin — CoBraLT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css?v=6.1">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      background: linear-gradient(135deg, #011e4a 0%, #013684 55%, #012a56 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem; font-family: var(--font-body);
    }
    .card {
      background: #fff; border-radius: 1.25rem;
      padding: 2.5rem 2.25rem 2rem; width: 100%; max-width: 380px;
      box-shadow: 0 32px 80px rgba(1,30,74,0.35);
    }
    .card-logo { display: flex; justify-content: center; margin-bottom: 2rem; }
    .card-logo img { height: 52px; object-fit: contain; }
    .card-title { font-family: var(--font-display); font-size: 1.3rem; color: #013684; margin: 0 0 0.25rem; text-align: center; }
    .card-sub { font-size: 0.8rem; color: #6b7280; text-align: center; margin: 0 0 1.75rem; }
    .field { margin-bottom: 1.1rem; }
    .field label { display: block; font-size: 0.76rem; font-weight: 600; color: #374151; margin-bottom: 0.4rem; letter-spacing: 0.03em; }
    .field input { width: 100%; padding: 0.75rem 1rem; border: 1.5px solid #e5e7eb; border-radius: 0.5rem; font-family: var(--font-body); font-size: 0.93rem; color: #013684; outline: none; transition: border-color 0.18s; }
    .field input:focus { border-color: #0284c7; }
    .field input.error { border-color: #ef4444; }
    .error-msg { display: none; font-size: 0.76rem; color: #ef4444; margin-top: 0.35rem; }
    .error-msg.visible { display: block; }
    .alert { display: none; padding: 0.75rem 1rem; border-radius: 0.5rem; font-size: 0.82rem; margin-bottom: 1rem; font-weight: 500; }
    .alert.danger  { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; display: block; }
    .alert.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; display: block; }
    .login-btn { width: 100%; padding: 0.85rem; background: #013684; color: #fff; border: none; border-radius: 0.5rem; font-family: var(--font-body); font-size: 0.93rem; font-weight: 600; cursor: pointer; transition: background 0.18s, opacity 0.18s; margin-top: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .login-btn:hover { background: #012a56; }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .back-link { display: block; text-align: center; margin-top: 1.25rem; font-size: 0.78rem; color: #9ca3af; text-decoration: none; transition: color 0.15s; }
    .back-link:hover { color: #013684; }
  </style>
</head>
<body>

<div class="card">
  <div class="card-logo">
    <img src="../assets/img/logo.png?v=6.1" alt="CoBraLT">
  </div>

  <h1 class="card-title">Área Administrativa</h1>
  <p class="card-sub">Acesso restrito a administradores.</p>

  <div class="alert" id="alertBox"></div>

  <div class="field">
    <label for="username">Usuário</label>
    <input type="text" id="username" placeholder="admin" autocomplete="username">
    <div class="error-msg" id="usernameErr">Informe o usuário.</div>
  </div>

  <div class="field">
    <label for="senha">Senha</label>
    <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
    <div class="error-msg" id="senhaErr">Informe a senha.</div>
  </div>

  <button class="login-btn" id="loginBtn" onclick="handleLogin()">
    <span id="btnLabel">Entrar</span>
    <div class="spinner" id="spinner"></div>
  </button>

  <a href="../index.php" class="back-link">← Voltar ao site</a>
</div>

<script>
async function handleLogin() {
  const usernameEl = document.getElementById('username');
  const senhaEl    = document.getElementById('senha');
  const alertBox   = document.getElementById('alertBox');
  const btn        = document.getElementById('loginBtn');
  const spinner    = document.getElementById('spinner');
  const btnLabel   = document.getElementById('btnLabel');

  // Reset
  alertBox.className = 'alert';
  alertBox.textContent = '';
  document.getElementById('usernameErr').classList.remove('visible');
  document.getElementById('senhaErr').classList.remove('visible');
  usernameEl.classList.remove('error');
  senhaEl.classList.remove('error');

  // Validação
  let valid = true;
  if (!usernameEl.value.trim()) {
    usernameEl.classList.add('error');
    document.getElementById('usernameErr').classList.add('visible');
    valid = false;
  }
  if (!senhaEl.value) {
    senhaEl.classList.add('error');
    document.getElementById('senhaErr').classList.add('visible');
    valid = false;
  }
  if (!valid) return;

  btn.disabled = true;
  btnLabel.textContent = 'Entrando…';
  spinner.style.display = 'block';

  try {
    const form = new FormData();
    form.append('username', usernameEl.value.trim());
    form.append('password', senhaEl.value);

    const res  = await fetch('../api/login.php', { method: 'POST', body: form });
    const data = await res.json();

    if (res.ok && data.success) {
      alertBox.className   = 'alert success';
      alertBox.textContent = 'Login realizado! Redirecionando…';
      setTimeout(() => window.location.href = '../admin/dashboard.php', 1000);
    } else {
      throw new Error(data.message || 'Credenciais inválidas.');
    }
  } catch (err) {
    alertBox.className   = 'alert danger';
    alertBox.textContent = err.message === 'Failed to fetch'
      ? 'Erro de conexão com o servidor.'
      : err.message;
    btn.disabled         = false;
    btnLabel.textContent = 'Entrar';
    spinner.style.display = 'none';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
